    <rect x="84" y="404" width="96" height="62" rx="13"></rect>
    <rect x="198" y="404" width="96" height="62" rx="13"></rect>
    <rect x="312" y="404" width="110" height="62" rx="13"></rect>
    <rect x="440" y="404" width="96" height="62" rx="13"></rect>
