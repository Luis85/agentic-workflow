<svg width="940" height="640" viewBox="0 0 940 640" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="artifact-title artifact-desc">
  <title id="artifact-title">Specorator artifact chain</title>
  <desc id="artifact-desc">A stack of workflow artifacts showing how a feature moves from idea through requirements, design, tasks, tests, review, and release.</desc>
  <rect width="940" height="640" rx="28" fill="#17201B"/>
  <rect x="56" y="54" width="828" height="532" rx="24" fill="#FAFBF8"/>
  <text x="94" y="109" fill="#17201B" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800">Feature state</text>
  <text x="94" y="139" fill="#59645E" font-family="Inter, Arial, sans-serif" font-size="16">Every artifact links back to the same intent.</text>
  <g font-family="Inter, Arial, sans-serif">
    <rect x="94" y="184" width="212" height="122" rx="16" fill="#E6F6EF" stroke="#A8D9C4" stroke-width="2"/>
    <text x="122" y="222" fill="#17201B" font-size="18" font-weight="800">idea.md</text>
    <text x="122" y="252" fill="#59645E" font-size="14">Problem, users, scope</text>
    <text x="122" y="278" fill="#59645E" font-size="14">Open questions</text>
    <rect x="364" y="184" width="212" height="122" rx="16" fill="#EBF0FF" stroke="#B9C5ED" stroke-width="2"/>
    <text x="392" y="222" fill="#17201B" font-size="18" font-weight="800">requirements.md</text>
    <text x="392" y="252" fill="#59645E" font-size="14">REQ IDs</text>
    <text x="392" y="278" fill="#59645E" font-size="14">EARS clauses</text>
    <rect x="634" y="184" width="212" height="122" rx="16" fill="#FFF8D8" stroke="#E2CF73" stroke-width="2"/>
    <text x="662" y="222" fill="#17201B" font-size="18" font-weight="800">design.md</text>
    <text x="662" y="252" fill="#59645E" font-size="14">UX, UI, architecture</text>
    <text x="662" y="278" fill="#59645E" font-size="14">ADR handoffs</text>
    <rect x="94" y="374" width="212" height="122" rx="16" fill="#F2E9FF" stroke="#D0B8F0" stroke-width="2"/>
    <text x="122" y="412" fill="#17201B" font-size="18" font-weight="800">tasks.md</text>
    <text x="122" y="442" fill="#59645E" font-size="14">T IDs</text>
    <text x="122" y="468" fill="#59645E" font-size="14">TDD order</text>
    <rect x="364" y="374" width="212" height="122" rx="16" fill="#E6F6EF" stroke="#A8D9C4" stroke-width="2"/>
    <text x="392" y="412" fill="#17201B" font-size="18" font-weight="800">test-report.md</text>
    <text x="392" y="442" fill="#59645E" font-size="14">TEST IDs</text>
    <text x="392" y="468" fill="#59645E" font-size="14">Coverage gaps</text>
    <rect x="634" y="374" width="212" height="122" rx="16" fill="#EBF0FF" stroke="#B9C5ED" stroke-width="2"/>
    <text x="662" y="412" fill="#17201B" font-size="18" font-weight="800">review.md</text>
    <text x="662" y="442" fill="#59645E" font-size="14">RTM complete</text>
    <text x="662" y="468" fill="#59645E" font-size="14">Release ready</text>
  </g>
  <g stroke="#7EA793" stroke-width="4" stroke-linecap="round">
    <path d="M306 245H364"/>
    <path d="M576 245H634"/>
    <path d="M740 306V340C740 360 724 374 704 374H306"/>
    <path d="M306 435H364"/>
    <path d="M576 435H634"/>
  </g>
  <rect x="94" y="526" width="752" height="34" rx="17" fill="#17201B"/>
  <text x="338" y="549" fill="#E6FF70" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="800">workflow-state.md keeps the chain resumable</text>
</svg>
