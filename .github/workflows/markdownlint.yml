name: markdownlint

on:
  pull_request:
    paths:
      - '**/*.md'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  markdownlint:
    name: markdownlint (non-blocking, changed files)
    runs-on: ubuntu-latest
    env:
      MARKDOWNLINT_CLI2_VERSION: 0.22.1
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Install markdownlint-cli2
        run: npm install --no-save --no-audit --no-fund "markdownlint-cli2@${MARKDOWNLINT_CLI2_VERSION}"

      - name: Get changed markdown files
        id: changed-markdown
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          mapfile -t changed < <(git diff --name-only --diff-filter=ACMR "origin/${BASE_REF}...HEAD" -- '*.md')
          if [ "${#changed[@]}" -eq 0 ]; then
            echo "No markdown files changed."
            echo "any=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          printf '%s\0' "${changed[@]}" > "$RUNNER_TEMP/changed-markdown-files"
          echo "any=true" >> "$GITHUB_OUTPUT"

      - name: Run markdownlint on changed files
        if: steps.changed-markdown.outputs.any == 'true'
        run: xargs -0 npx --no-install markdownlint-cli2 < "$RUNNER_TEMP/changed-markdown-files"
        continue-on-error: true
