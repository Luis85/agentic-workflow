name: markdownlint

on:
  pull_request:
    paths:
      - '**/*.md'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  markdownlint:
    name: markdownlint (non-blocking, changed files)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Run markdownlint on changed files
        run: |
          CHANGED=$(git diff --name-only --diff-filter=ACMR origin/${{ github.base_ref }}...HEAD -- '*.md' '**/*.md' | xargs)
          if [ -n "$CHANGED" ]; then
            npx --yes markdownlint-cli2 $CHANGED || true
          else
            echo "No markdown files changed."
          fi
