name: Release

# Manual GitHub Release workflow for v0.5 (T-V05-006 + T-V05-007).
#
# Composes `npm run check:release-readiness` (Layer 1 — release metadata),
# `npm pack` to materialise a candidate archive, `npm run
# check:release-package-contents` (Layer 2 — fresh-surface contract per
# ADR-0021 / SPEC-V05-010), `gh release create` for the canonical `vX.Y.Z`
# tag on `main` per ADR-0020, `npm publish` to GitHub Packages, and
# `gh release upload` to attach the package tarball as a release asset.
#
# Inputs and the confirm gate satisfy SPEC-V05-002 (explicit publish
# authorisation), SPEC-V05-003 (GitHub Release publication), SPEC-V05-004
# (package contract and publication), and SPEC-V05-009 (release candidate
# dry run).

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Semantic version X.Y.Z to release. Must equal `package.json#version` and the existing `v<version>` tag on main.'
        type: string
        required: true
      dry_run:
        description: 'Dry run — execute readiness + lifecycle steps without creating a GitHub Release (REQ-V05-011 / SPEC-V05-009).'
        type: boolean
        required: false
        default: true
      prerelease:
        description: 'Mark the published Release as a pre-release.'
        type: boolean
        required: false
        default: false
      draft:
        description: 'Create the Release in draft state (operator finalises before publishing).'
        type: boolean
        required: false
        default: false
      confirm:
        description: 'Type the literal version (X.Y.Z) to authorise non-dry-run publish (SPEC-V05-002).'
        type: string
        required: false
        default: ''
      publish_package:
        description: 'Publish the package to GitHub Packages on this run (SPEC-V05-004). Defaults to false so candidate runs — `dry_run`, `draft`, `prerelease`, or a release intended for review only — do not push the npm package. The package publish step is gated on `! dry_run && publish_package`; the GitHub Release create + asset upload run on `! dry_run` regardless.'
        type: boolean
        required: false
        default: false

# Least-privilege workflow permissions per ADR-0020 / SPEC-V05-002 / NFR-V05-001.
# `RELEASE_READINESS_WORKFLOW_PERMISSIONS` (PR #158, scripts/lib/release-readiness.ts)
# enforces the top-level block as exactly { contents: write, packages: write };
# job-level overrides may only narrow, never widen. The single `release` job
# below uses both: `contents: write` for `gh release create` + `gh release
# upload`, and `packages: write` for `npm publish` to GitHub Packages.
#
# zizmor's `excessive-permissions` and `undocumented-permissions` lints prefer
# top-level `{}` with job-scoped writes. For a single-job workflow that uses
# both writes, top-level == job-level effectively, and the spec requires the
# top-level declaration so the readiness check can self-validate the workflow
# file (REQ-V05-002 / NFR-V05-001). Documented exception, suppressed inline.
permissions: # zizmor: ignore[excessive-permissions,undocumented-permissions]
  contents: write # zizmor: ignore[excessive-permissions]
  packages: write # zizmor: ignore[excessive-permissions]

concurrency:
  group: release-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  release:
    name: Manual GitHub Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      # `registry-url` + `scope` write `~/.npmrc` so the `npm publish` step
      # below authenticates against GitHub Packages using `NODE_AUTH_TOKEN`
      # (T-V05-007 / SPEC-V05-004). The scope `@luis85` matches
      # `package-contract.md` §2 and `EXPECTED_PACKAGE_NAME` in
      # `scripts/lib/release-readiness.ts`.
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
          registry-url: 'https://npm.pkg.github.com'
          scope: '@luis85'

      - name: Install dependencies
        run: npm ci

      # Step 4 — Layer 1 readiness (release metadata only). The CLI reads
      # version + quality signals from the env mapping below, so no
      # `${{ inputs.* }}` value lands inside the `run:` shell string (zizmor
      # template-injection guard).
      - name: Readiness — Layer 1 (release metadata)
        env:
          RELEASE_VERSION: ${{ inputs.version }}
          RELEASE_CI_STATUS: ${{ vars.RELEASE_CI_STATUS }}
          RELEASE_VALIDATION_STATUS: ${{ vars.RELEASE_VALIDATION_STATUS }}
          RELEASE_QUALITY_WAIVER: ${{ vars.RELEASE_QUALITY_WAIVER }}
        run: npm run check:release-readiness -- --json

      # Step 5 — build the candidate archive. `npm pack` honours
      # `package.json#files` (T-V05-007 / package-contract.md §3) and emits a
      # tarball that mirrors what `npm publish` would ship. Extract into a
      # sibling directory so step 6 can run the fresh-surface assertions
      # against the candidate tree without re-tar'ing.
      #
      # `package-lock.json` is intentionally stripped by `npm pack` even when
      # listed in `files`; `npm-shrinkwrap.json` is the npm-canonical
      # publication lockfile, listed in `package.json#files` so it ships in
      # the tarball. `package-contract.md` §3 promises a shipped lockfile so
      # consumers have a deterministic `npm ci` baseline after copying the
      # template (Codex P2 on PR #160). Stage the lockfile under the canonical
      # name on the runner before pack; the codebase form keeps
      # `package-lock.json` for day-to-day development and the runner is
      # ephemeral so no codebase cleanup is needed.
      - name: Build candidate archive
        id: pack
        run: |
          cp package-lock.json npm-shrinkwrap.json
          archive_root="$(mktemp -d)"
          tarball_name="$(npm pack --silent --pack-destination "$archive_root")"
          tarball_path="${archive_root}/${tarball_name}"
          extract_dir="${archive_root}/extracted"
          mkdir -p "$extract_dir"
          # `npm pack` wraps contents in a top-level `package/` directory;
          # `--strip-components=1` lifts them to `extract_dir` directly so the
          # archive layout matches the running repo (what
          # `checkReleasePackageContents` walks).
          tar -xzf "$tarball_path" -C "$extract_dir" --strip-components=1
          echo "tarball=${tarball_path}" >> "$GITHUB_OUTPUT"
          echo "archive_dir=${extract_dir}" >> "$GITHUB_OUTPUT"

      # Step 6 — Layer 2 readiness. Asserts the three fresh-surface contract
      # rules from ADR-0021 / SPEC-V05-010 against the extracted archive: no
      # numbered ADRs ship, intake folders are empty, docs are stubs. Fails
      # closed when any assertion fails — release is blocked before publish.
      - name: Readiness — Layer 2 (fresh-surface)
        env:
          RELEASE_PACKAGE_ARCHIVE: ${{ steps.pack.outputs.archive_dir }}
        run: npm run check:release-package-contents -- --json

      # Step 8 — confirm gate. SPEC-V05-002 requires the operator to type the
      # literal version to authorise a non-dry-run publish. Step 7 (tag at
      # main) is already covered by Layer 1 readiness above.
      - name: Confirm gate
        if: ${{ ! inputs.dry_run }}
        env:
          INPUT_CONFIRM: ${{ inputs.confirm }}
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          if [ "${INPUT_CONFIRM}" != "${INPUT_VERSION}" ]; then
            echo "::error::confirm input does not match version — refusing to publish (SPEC-V05-002)" >&2
            exit 1
          fi

      # Step 9a — non-dry-run: create the GitHub Release. Generated notes use
      # the `.github/release.yml` categories from PR #156 (T-V05-003).
      - name: Create GitHub Release
        if: ${{ ! inputs.dry_run }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_PRERELEASE: ${{ inputs.prerelease }}
          INPUT_DRAFT: ${{ inputs.draft }}
        run: |
          flags=()
          if [ "${INPUT_PRERELEASE}" = "true" ]; then flags+=(--prerelease); fi
          if [ "${INPUT_DRAFT}" = "true" ]; then flags+=(--draft); fi
          # `--verify-tag` makes `gh release create` fail if `vX.Y.Z` does not
          # already exist (Codex P2 on PR #159). Without it, `gh release
          # create` auto-creates the tag from `--target main` when it is
          # missing, which would silently bypass the ADR-0020 requirement that
          # the canonical tag is cut on main *before* the workflow runs.
          # Layer 1 readiness already enforces this, but `--verify-tag` is a
          # cheap defence-in-depth against a tag-race or readiness-gap path.
          gh release create "v${INPUT_VERSION}" \
            --target main \
            --title "v${INPUT_VERSION}" \
            --verify-tag \
            --generate-notes \
            "${flags[@]}"

      # Step 9b — dry run: log a generated-notes preview without creating any
      # public artifact (SPEC-V05-009). All readiness diagnostics from step 4
      # have already gated the run.
      - name: Log dry-run candidate (no Release created)
        if: ${{ inputs.dry_run }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_PRERELEASE: ${{ inputs.prerelease }}
          INPUT_DRAFT: ${{ inputs.draft }}
        run: |
          echo 'Dry run — no GitHub Release created.'
          echo "Candidate tag: v${INPUT_VERSION}"
          echo "Prerelease flag: ${INPUT_PRERELEASE}"
          echo "Draft flag: ${INPUT_DRAFT}"
          echo '--- Generated release notes preview ---'
          gh api -X POST "repos/${GITHUB_REPOSITORY}/releases/generate-notes" \
            -f "tag_name=v${INPUT_VERSION}" \
            -f target_commitish=main \
            --jq '.body' \
            || echo '(generate-notes preview unavailable; readiness diagnostics above remain authoritative)'

      # Step 10 — publish the package to GitHub Packages. `actions/setup-node`
      # wrote `~/.npmrc` with the `@luis85` scope mapped to npm.pkg.github.com;
      # `NODE_AUTH_TOKEN` provides the credential. The pre-flight check
      # short-circuits before `npm publish` if `package.json` drifted from
      # `INPUT_VERSION` between Layer 1 readiness and now (defence-in-depth
      # against tag-race / late-merge). Visibility is inherited from the
      # repository on GitHub Packages — `--access` is unnecessary for the
      # `@luis85` scope on a public repo.
      #
      # The step is gated on `! dry_run && publish_package` so candidate runs
      # (draft / pre-release / non-package release) do not publish a stable
      # package version (SPEC-V05-009). The operator opts in by setting
      # `publish_package: true` alongside `dry_run: false` and a matching
      # `confirm` input; the asset upload in step 11 still runs on
      # `! dry_run` so a draft Release can carry the tarball for reviewer
      # inspection without an irreversible npm publish.
      #
      # zizmor's `use-trusted-publishing` audit suggests OIDC trusted
      # publishing instead of a token. GitHub Packages does not currently
      # support OIDC trusted publishing for npm — the documented credential is
      # `GITHUB_TOKEN` plus the `packages: write` permission already declared
      # at the workflow level. The audit is suppressed at the step boundary;
      # revisit when GitHub Packages adds OIDC support.
      - name: Publish to GitHub Packages # zizmor: ignore[use-trusted-publishing]
        if: ${{ ! inputs.dry_run && inputs.publish_package }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          actual="$(node -p "require('./package.json').name + '@' + require('./package.json').version")"
          expected="@luis85/agentic-workflow@${INPUT_VERSION}"
          if [ "$actual" != "$expected" ]; then
            echo "::error::package.json identity (${actual}) does not match expected (${expected}) — refusing to publish (T-V05-007)" >&2
            exit 1
          fi
          # Idempotency check (NFR-V05-005, Codex P1 on PR #160 rounds 3-4).
          # When a previous run published successfully but failed in step 11
          # (asset upload), rerunning the workflow with the same inputs would
          # otherwise die here with `EPUBLISHCONFLICT` — `npm publish` is not
          # repeatable for the same `name@version`. Query the registry first
          # and branch on the result:
          #   - exit 0 + version present → already published, skip npm publish
          #     so step 11 gets a chance to recover the asset upload.
          #   - npm E404 → version genuinely not published, proceed.
          #   - any other failure (transient registry / auth / DNS) → fail
          #     closed; do NOT fall through to `npm publish`, otherwise we'd
          #     still hit `EPUBLISHCONFLICT` on a real conflict that the view
          #     could not confirm (Codex round-4 P1 on PR #160).
          set +e
          view_output="$(npm view "@luis85/agentic-workflow@${INPUT_VERSION}" version --json 2>&1)"
          view_exit=$?
          set -e
          if [ "$view_exit" -eq 0 ] && echo "$view_output" | grep -q "\"${INPUT_VERSION}\""; then
            echo "::notice::version ${INPUT_VERSION} already published to GitHub Packages — skipping npm publish (idempotent rerun, NFR-V05-005)"
          elif echo "$view_output" | grep -qE "\"code\": *\"E404\"|E404|code E404|404 Not Found"; then
            npm publish
          else
            echo "::error::npm view failed with a non-404 error — refusing to publish so EPUBLISHCONFLICT cannot mask a real failure" >&2
            echo "$view_output" >&2
            exit 1
          fi

      # Step 11 — attach the candidate tarball as a release asset. Runs after
      # `gh release create` (step 9) so the release exists; `--clobber` lets a
      # rerun replace a partial asset from an earlier failed publish without
      # manual cleanup (NFR-V05-005 recoverability).
      - name: Attach release asset
        if: ${{ ! inputs.dry_run }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_VERSION: ${{ inputs.version }}
          TARBALL: ${{ steps.pack.outputs.tarball }}
        run: |
          gh release upload "v${INPUT_VERSION}" "${TARBALL}" --clobber
