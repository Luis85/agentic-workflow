name: gitleaks

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: '47 5 * * 1'

permissions:
  contents: read

jobs:
  gitleaks:
    name: scan for committed secrets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
