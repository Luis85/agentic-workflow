version: 2

updates:
  # GitHub Actions — keep SHA pins fresh
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 5
    commit-message:
      prefix: chore
      include: scope
    labels:
      - area:ci
      - dependencies
    groups:
      actions-minor-and-patch:
        update-types:
          - minor
          - patch

  # npm — verify-gate tooling
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:30"
      timezone: Etc/UTC
    open-pull-requests-limit: 5
    versioning-strategy: increase-if-necessary
    commit-message:
      prefix: chore
      include: scope
    labels:
      - area:scripts
      - dependencies
    groups:
      dev-dependencies:
        dependency-type: development
        update-types:
          - minor
          - patch
